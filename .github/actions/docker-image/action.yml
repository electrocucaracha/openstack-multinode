name: Docker image
description: Analyzes security vulnerabilities and size of a given docker image
inputs:
  image:
    description: Docker image name
runs:
  using: "composite"
  steps:
    - name: Get Docker Image layer contents
      uses: MaxymVlasov/dive-action@726042660e3c8f7263350e14b202cc35d671db20 # 2.0.0
      with:
        image: ${{ inputs.image }}
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # 0.36.0
      with:
        image-ref: "${{ inputs.image }}"
        format: sarif
        output: results.sarif
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@86b04fb0e47484f7282357688f21d5d0e32175fe # 3.26.9
      with:
        sarif_file: results.sarif
        category: "${{ inputs.image }}"
