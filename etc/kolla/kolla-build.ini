[DEFAULT]

#
# From kolla
#

# The distro type of the base image. (string value)
# Possible values:
# centos - <No description provided>
# debian - <No description provided>
# rocky - <No description provided>
# ubuntu - <No description provided>
base = centos

# The base distro image tag (string value)
#base_tag = latest

# The base image name. Default is the same with base. (string value)
#base_image = <None>

# The base architecture. Default is same as host. (string value)
# Possible values:
# x86_64 - <No description provided>
# aarch64 - <No description provided>
#base_arch = x86_64

# The base architecture used for downloading external packages.
# Default is derived from base-arch. (string value)
# Possible values:
# amd64 - <No description provided>
# arm64 - <No description provided>
#debian_arch = amd64

# Use dumb-init as init system in containers (boolean value)
#use_dumb_init = true

# Turn on debugging log level (boolean value)
#debug = false

# Do not rebuild parents of matched images (boolean value)
#skip_parents = false

# Do not rebuild images present in the container engine cache (boolean
# value)
skip_existing = true

# Set docker build time variables Dictionary of sha256 sums for GitHub sources (dict value)
#build_args = <None>

# Keep failed intermediate containers (boolean value)
#keep = false

# Show image dependencies (filtering supported) (boolean value)
#list_dependencies = <None>

# Show all available images (filtering supported) (boolean value)
#list_images = <None>

# Base directory for local source resolution (string value)
#locals_base = ./

# The Docker namespace name (string value)
#namespace = kolla

# The network mode for Docker build. Example: host (string value)
#network_mode = host

# Use the container engine cache when building (boolean value)
#cache = true

# The path where patch files to be applied are located (string value)
#patches_path = <None>

# The platform to use for a cross-compile build. Should be set in
# conjunction with "--base-arch" argument. Example: "--platform
# linux/arm64 --base-arch aarch64" (string value)
#platform = <None>

# Build a pre-defined set of images, see [profiles] section in config.
# The default profiles are: infra, main, aux, default (string value)
profile = main

# Push images after building (boolean value)
push = true

# The number of threads to use while pushing images. Note: Docker
# cannot handle threaded pushing properly (integer value)
# Minimum value: 1
push_threads = 8

# The number of times to retry while building (integer value)
# Minimum value: 0
retries = 10

# Build only images matching regex and its dependencies (string value)
#regex = <None>

# The container image registry host. The default registry host is
# Docker Hub (string value)
registry = 10.10.13.2:5000

# Path to the file to store the docker image dependency in Graphviz
# dot format (string value)
#save_dependency = <None>

# Format to write the final results in. (string value)
# Possible values:
# json - <No description provided>
# none - <No description provided>
#format = json

# Name of a file to write the build summary to when format is json. If
# unset, the summary will be written to standard output (string value)
#summary_json_file = <None>

# Base url to OpenStack tarballs (string value)
#tarballs_base = https://tarballs.opendev.org

# The number of threads to use while building. (Note: setting to one
# will allow real time logging) (integer value)
# Minimum value: 1
threads = 4

# The container image tag (string value)
tag = 17.0.0

# Don't build images. Generate Dockerfile only (boolean value)
#template_only = false

# Time in seconds after which any operation times out (integer value)
#timeout = 120

# Path to template override file (string value)
#template_override = <None>

# Path to additional docker file template directory, can be specified
# multiple times (string value)
#docker_dir = <None>

# Path to logs directory (string value)
logs_dir = /tmp/kolla

# Attempt to pull a newer version of the base image (boolean value)
#pull = true

# Path to be used as working directory. By default, a temporary dir is
# created (string value)
work_dir = /tmp/kolla/work_dir

# Squash the image layers. WARNING: it will consume lots of disk IO.
# "docker-squash" tool is required, install it by "pip install docker-
# squash" (boolean value)
#squash = false

# OpenStack release for building kolla source images and kolla-toolbox
# image (string value)
#openstack_release = 2026.1

# OpenStack release codename for Debian OpenStack extrepo (string
# value)
#openstack_release_codename = Gazpacho

# Branch for source images (internal; with a dash; please set
# openstack-release instead) (string value)
#openstack_branch = <None>

# Branch for source images (internal; with a slash; please set
# openstack-release instead) (string value)
#openstack_branch_slashed = <None>

# Add Kolla docker healthcheck scripts in the image (boolean value)
#docker_healthchecks = true

# Do not print image logs (boolean value)
quiet = true

# Enable images marked as unbuildable (boolean value)
#enable_unbuildable = false

# Show summary at the end of build (boolean value)
#summary = true

# Prefix prepended to image names (string value)
#image_name_prefix =

# Path to alternative repos.yaml file (string value)
#repos_yaml =

# Container engine to build images on. (string value)
# Possible values:
# docker - <No description provided>
# podman - <No description provided>
#engine = docker

# Path to podman socket. (string value)
#podman_base_url = unix:///run/podman/podman.sock

# Content of the maintainer label (string value)
#maintainer = Kolla Project (https://launchpad.net/kolla)

# Use this parameter to override the default package manager used by
# kolla. For example, if you want to use yum on a system with dnf, set
# this to yum which will use yum command in the build process (string
# value)
#distro_package_manager = <None>

# Set the package type of the distro. If not set then the packaging
# type is set to "rpm" if a RHEL based distro and "deb" if a Debian
# based distro. (string value)
#base_package_type = <None>

# Comma separated list of .rpm or .repo file(s) or URL(s) to install
# before building containers (list value)
#rpm_setup_config = https://trunk.rdoproject.org/centos9-epoxy/delorean-deps.repo

# Path to custom sources.list (string value)
#apt_sources_list = <None>

# Path to custom apt/preferences (string value)
#apt_preferences = <None>

# Remove source image from Docker after squashing (boolean value)
#squash_cleanup = true

# Temporary directory to be used during squashing (string value)
#squash_tmp_dir = <None>

# Clean all package cache. (boolean value)
#clean_package_cache = true

# Images which are allowed to fail (list value)
#allowed_to_fail =


